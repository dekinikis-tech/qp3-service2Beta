name: VPN Auto Update

on:
  schedule:
    - cron: '0 */2 * * *'   # каждые 2 часа — INT+RU источников стало больше,
                              # за час не всегда успевает
  workflow_dispatch:          # ручной запуск из вкладки Actions

# Новый запуск автоматически отменяет предыдущий
concurrency:
  group: vpn-update
  cancel-in-progress: true

jobs:
  update_gist:
    runs-on: ubuntu-latest
    # С RU+INT источниками и TOP_N_EACH=50 нужно ~40 минут на слабой машине
    timeout-minutes: 55

    steps:
      # ── 1. Получаем код репозитория ───────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python 3.11 ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Скачиваем последний Xray-core ──────────────────────────────────
      - name: Install Xray
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/XTLS/Xray-core/releases/latest")

          if echo "$API_RESPONSE" | jq -e '.assets' > /dev/null 2>&1; then
            LATEST_URL=$(echo "$API_RESPONSE" \
              | jq -r '.assets[] | select(.name == "Xray-linux-64.zip") | .browser_download_url')
          else
            echo "GitHub API error:"
            echo "$API_RESPONSE" | jq '.' || echo "$API_RESPONSE"
            exit 1
          fi

          echo "Downloading Xray from: $LATEST_URL"
          wget -q -O xray.zip "$LATEST_URL"
          unzip -o xray.zip xray
          sudo mv xray /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray
          xray version

      # ── 4. Python-зависимости ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install "requests[socks]"

      # ── 5. Запускаем сканер ───────────────────────────────────────────────
      - name: Run checker
        env:
          GH_TOKEN:   ${{ secrets.GIST_TOKEN }}
          MY_GIST_ID: ${{ secrets.MY_GIST_ID }}
          # Раскомментируй если runner медленный и получаешь много таймаутов:
          # MY_SLOW_NET: '1'
        run: python main.py

      # ── 6. Сохраняем артефакты для отладки ───────────────────────────────
      - name: Upload artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vpn-results-${{ github.run_number }}
          path: |
            vps.txt
            sub.txt
            index.html
          retention-days: 3   # хранить 3 дня, не засорять хранилище
