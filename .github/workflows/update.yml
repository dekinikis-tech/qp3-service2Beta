name: VPN Auto Update

on:
  schedule:
    - cron: '0 */3 * * *'  # Запуск каждые 3 часа (в 00:00, 03:00, 06:00 и т.д. по UTC)
  workflow_dispatch:      # Возможность запускать вручную

concurrency:
  group: vpn-update
  cancel-in-progress: true

jobs:
  update_gist:
    runs-on: ubuntu-latest
    # Лимит времени выполнения (уменьшен до 150 минут, чтобы не перекрывать следующий запуск)
    timeout-minutes: 150

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Xray
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://github.com")

          # Проверяем, что ответ валидный
          if echo "$API_RESPONSE" | jq -e '.assets' > /dev/null 2>&1; then
            LATEST_URL=$(echo "$API_RESPONSE" \

              | jq -r '.assets[] | select(.name == "Xray-linux-64.zip") | .browser_download_url')
          else
            echo "GitHub API error:"
            echo "$API_RESPONSE" | jq '.' || echo "$API_RESPONSE"
            exit 1
          fi

          echo "Downloading Xray from: $LATEST_URL"
          wget -q -O xray.zip "$LATEST_URL"
          unzip -o xray.zip xray
          sudo mv xray /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray
          xray version

      - name: Install Python dependencies
        run: pip install "requests[socks]"

      - name: Run checker
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          MY_GIST_ID: ${{ secrets.MY_GIST_ID }}
        run: python main.py
